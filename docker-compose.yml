version: '3.8'

services:
  pushmon-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pushmon-server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/pushmon.db
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3